<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
	<title>Braggers Community — Donut Tycoon</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		:root { --text-dim: #9aa0a6; }
		body {
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
			background: #1a1a2e; color: #ffe; min-height: 100vh; min-height: 100dvh;
			-webkit-font-smoothing: antialiased;
		}
		.back-bar {
			position: sticky; top: 0; z-index: 10;
			background: rgba(26,26,46,0.95); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
			border-bottom: 1px solid rgba(255,255,255,0.1); padding: 12px 20px;
			display: flex; justify-content: space-between; align-items: center;
		}
		.back-link { color: #ffeb3b; text-decoration: none; font-size: 0.9rem; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; transition: color 0.15s; }
		.back-link:hover { color: #fff; }
		.brag-link { color: #ff9100; text-decoration: none; font-size: 0.85rem; font-weight: 500; transition: color 0.15s; }
		.brag-link:hover { color: #fff; }
		.container { max-width: 680px; margin: 0 auto; padding: 24px 16px 60px; }
		h1 { font-size: 2rem; margin-bottom: 4px; color: #ffeb3b; text-align: center; }
		.subtitle { font-size: 0.9rem; color: #a5d6a7; margin-bottom: 20px; text-align: center; }
		.stats-bar { text-align: center; margin-bottom: 16px; padding: 10px 0; }
		.stats-bar .counter { display: inline-block; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 20px; padding: 8px 18px; font-size: 0.9rem; font-weight: 600; color: #ffeb3b; letter-spacing: 0.3px; }
		.stats-bar .counter span { color: #fff; }

		/* Sort Pills */
		.sort-bar { display: flex; gap: 8px; justify-content: center; margin-bottom: 18px; }
		.sort-pill {
			padding: 7px 16px; border-radius: 20px; font-size: 0.8rem; font-weight: 600;
			background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
			color: var(--text-dim); cursor: pointer; transition: all 0.15s;
			font-family: inherit; white-space: nowrap;
		}
		.sort-pill:hover { background: rgba(255,255,255,0.1); color: #fff; }
		.sort-pill.active { background: rgba(0,229,255,0.15); border-color: rgba(0,229,255,0.4); color: #00e5ff; }

		.loading { text-align: center; color: var(--text-dim); padding: 40px 0; font-size: 0.95rem; }
		.empty-state { text-align: center; padding: 60px 20px; }
		.empty-state .icon { font-size: 4rem; margin-bottom: 16px; }
		.empty-state p { color: var(--text-dim); font-size: 1rem; margin-bottom: 8px; }
		.empty-state .cta { color: #ff9100; font-weight: 600; text-decoration: none; font-size: 1rem; }
		.bragger-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; overflow: hidden; margin-bottom: 20px; transition: transform 0.15s, box-shadow 0.15s; }
		.bragger-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
		.bragger-card img { width: 100%; height: auto; display: block; border-bottom: 1px solid rgba(255,255,255,0.08); }
		.bragger-card .info { padding: 14px 18px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; font-size: 0.9rem; color: #d0d3d8; }
		.bragger-card .info .name { font-weight: 600; color: #fff; font-size: 1rem; }
		.bragger-card .info .rank { color: #ffd700; font-weight: 600; }
		.bragger-card .info .cps { color: #a5d6a7; }
		.bragger-card .info .donuts-display { color: #ffeb3b; font-weight: 600; }
		.bragger-card .info .time { margin-left: auto; font-size: 0.8rem; color: var(--text-dim); }
		.error-state { text-align: center; padding: 40px 20px; color: #f28b82; }
		.error-state button { margin-top: 12px; padding: 10px 20px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 0.9rem; }
	</style>
</head>
<body>

	<div class="back-bar">
		<a href="index.html" class="back-link">← Back to Game</a>
		<a href="brag.html" class="brag-link">📜 Create Yours</a>
	</div>

	<div class="container">
		<h1>🍩 Braggers Community</h1>
		<p class="subtitle">See how others are flexing their empires</p>

		<div class="stats-bar" id="statsBar" style="display:none;">
			<div class="counter">🍩 <span id="braggerCount">0</span> braggers shared</div>
		</div>

		<div class="sort-bar" id="sortBar" style="display:none;">
			<button class="sort-pill active" data-sort="recent">🕐 Recent</button>
			<button class="sort-pill" data-sort="donuts">🍩 Most Donuts</button>
			<button class="sort-pill" data-sort="cps">⚡ Highest CPS</button>
		</div>

		<div class="loading" id="loading">Loading braggers...</div>
		<div class="empty-state" id="emptyState" style="display:none;">
			<div class="icon">🍩</div>
			<p>No braggers shared yet.</p>
			<p>Be the first to flex your empire!</p>
			<a href="brag.html" class="cta">Create your bragger →</a>
		</div>
		<div class="error-state" id="errorState" style="display:none;">
			<p>Couldn't load braggers.</p>
			<button onclick="location.reload()">Try Again</button>
		</div>
		<div id="braggersFeed"></div>
	</div>

	<script>
		document.addEventListener('DOMContentLoaded', function() {

			var ACCESS_KEY = '$2a$10$XcfN.ngGjFuRKOdFxiePK.zff4P238qGtFiDq/eusWHB.TVTKn16q';
			var BINS = [
				{ id: '6a004b54250b1311c32bfef7', url: 'https://api.jsonbin.io/v3/b/6a004b54250b1311c32bfef7' },
				{ id: '69ffef95250b1311c32a6323', url: 'https://api.jsonbin.io/v3/b/69ffef95250b1311c32a6323' }
			];
			var CACHE_KEY = 'donutBraggerCache';
			var CACHE_TIME_KEY = 'donutBraggerCacheTime';
			var CACHE_DURATION = 10 * 60 * 1000;
			var SORT_KEY = 'donutCommunitySort';

			var loading = document.getElementById('loading');
			var emptyState = document.getElementById('emptyState');
			var errorState = document.getElementById('errorState');
			var statsBar = document.getElementById('statsBar');
			var sortBar = document.getElementById('sortBar');
			var braggerCount = document.getElementById('braggerCount');
			var feed = document.getElementById('braggersFeed');

			var allBraggers = [];
			var currentSort = sessionStorage.getItem(SORT_KEY) || 'recent';

			// Init sort pills
			var pills = sortBar.querySelectorAll('.sort-pill');
			for (var p = 0; p < pills.length; p++) {
				if (pills[p].getAttribute('data-sort') === currentSort) {
					pills[p].classList.add('active');
				} else {
					pills[p].classList.remove('active');
				}
				pills[p].addEventListener('click', function() {
					var newSort = this.getAttribute('data-sort');
					if (newSort === currentSort) return;
					currentSort = newSort;
					sessionStorage.setItem(SORT_KEY, currentSort);
					for (var q = 0; q < pills.length; q++) {
						pills[q].classList.remove('active');
					}
					this.classList.add('active');
					renderBraggers(allBraggers);
				});
			}

			function getRelativeTime(timestamp) {
				var now = Date.now(); var diff = now - timestamp;
				var seconds = Math.floor(diff / 1000); var minutes = Math.floor(seconds / 60);
				var hours = Math.floor(minutes / 60); var days = Math.floor(hours / 24);
				if (days > 30) return Math.floor(days / 30) + " month" + (Math.floor(days / 30) > 1 ? "s" : "") + " ago";
				if (days > 0) return days + " day" + (days > 1 ? "s" : "") + " ago";
				if (hours > 0) return hours + " hour" + (hours > 1 ? "s" : "") + " ago";
				if (minutes > 0) return minutes + " minute" + (minutes > 1 ? "s" : "") + " ago";
				return "just now";
			}

			function getCountryFlag(countryCode) {
				if (!countryCode || countryCode === 'Earth') return '🌍';
				var codePoints = [];
				for (var i = 0; i < 2; i++) { codePoints.push(0x1F1E6 + countryCode.charCodeAt(i) - 65); }
				return String.fromCodePoint(codePoints[0], codePoints[1]);
			}

			function getStarString(stars) {
				var s = ''; for (var i = 0; i < stars; i++) s += '★'; return s;
			}

			function sortBraggers(braggers) {
				var sorted = braggers.slice();
				if (currentSort === 'donuts') {
					sorted.sort(function(a, b) { return (b.donuts || 0) - (a.donuts || 0); });
				} else if (currentSort === 'cps') {
					sorted.sort(function(a, b) { return (b.cps || 0) - (a.cps || 0); });
				} else {
					sorted.sort(function(a, b) { return (b.timestamp || 0) - (a.timestamp || 0); });
				}
				return sorted;
			}

			function renderBraggers(braggers) {
				allBraggers = braggers;
				var sorted = sortBraggers(braggers);
				feed.innerHTML = '';
				var count = sorted.length;
				braggerCount.textContent = count;
				if (count > 0) { statsBar.style.display = 'block'; sortBar.style.display = 'flex'; } else { statsBar.style.display = 'none'; sortBar.style.display = 'none'; emptyState.style.display = 'block'; return; }
				emptyState.style.display = 'none';

				for (var i = 0; i < sorted.length; i++) {
					var b = sorted[i];
					if (!b || !b.imageUrl) continue;
					var card = document.createElement('div'); card.className = 'bragger-card';
					var flag = getCountryFlag(b.countryCode || 'Earth');
					var timeStr = b.timestamp ? getRelativeTime(b.timestamp) : '';
					var donutsStr = b.donuts ? Math.floor(b.donuts).toLocaleString() : '0';
					card.innerHTML =
						'<img src="' + b.imageUrl + '" alt="Bragger by ' + (b.name || 'Unknown') + '" loading="lazy" />' +
						'<div class="info">' +
							'<span class="name">' + (b.name || 'Anonymous') + '</span>' +
							'<span class="rank">' + getStarString(b.stars || 1) + ' ' + (b.rankTitle || 'Tycoon') + '</span>' +
							'<span class="cps">⚡ ' + ((b.cps || 0).toFixed(1)) + '/s</span>' +
							'<span class="donuts-display">🍩 ' + donutsStr + '</span>' +
							'<span>' + flag + ' ' + (b.countryName || 'Earth') + '</span>' +
							(timeStr ? '<span class="time">' + timeStr + '</span>' : '') +
						'</div>';
					feed.appendChild(card);
				}
			}

			function fetchAllBins() {
				loading.style.display = 'block'; emptyState.style.display = 'none'; errorState.style.display = 'none'; statsBar.style.display = 'none'; sortBar.style.display = 'none';

				var binsCompleted = 0;
				var hasError = false;
				var freshBraggers = [];

				function checkComplete() {
					binsCompleted++;
					if (binsCompleted >= BINS.length) {
						loading.style.display = 'none';
						if (hasError && freshBraggers.length === 0) { errorState.style.display = 'block'; return; }
						if (freshBraggers.length === 0) { emptyState.style.display = 'block'; return; }
						renderBraggers(freshBraggers);
						var cacheData = { braggers: freshBraggers, timestamp: Date.now() };
						localStorage.setItem(CACHE_KEY, JSON.stringify(cacheData));
						localStorage.setItem(CACHE_TIME_KEY, Date.now().toString());
					}
				}

				for (var i = 0; i < BINS.length; i++) {
					(function(bin) {
						var xhr = new XMLHttpRequest();
						xhr.open('GET', bin.url, true);
						xhr.setRequestHeader('X-Access-Key', ACCESS_KEY);
						xhr.timeout = 8000;
						xhr.onload = function() {
							if (xhr.status === 200) {
								try {
									var resp = JSON.parse(xhr.responseText);
									if (resp.record && Array.isArray(resp.record)) {
										for (var j = 0; j < resp.record.length; j++) {
											if (resp.record[j] && resp.record[j].imageUrl) {
												freshBraggers.push(resp.record[j]);
											}
										}
									}
								} catch(e) {}
							} else { hasError = true; }
							checkComplete();
						};
						xhr.onerror = function() { hasError = true; checkComplete(); };
						xhr.ontimeout = function() { hasError = true; checkComplete(); };
						xhr.send();
					})(BINS[i]);
				}
			}

			function loadBraggers() {
				var urlParams = new URLSearchParams(window.location.search);
				var bypassCache = urlParams.get('fresh') === 'true';
				if (bypassCache && window.history && window.history.replaceState) {
					window.history.replaceState({}, document.title, window.location.pathname);
				}
				if (bypassCache) { fetchAllBins(); return; }

				var cachedData = localStorage.getItem(CACHE_KEY);
				var cachedTime = localStorage.getItem(CACHE_TIME_KEY);
				if (cachedData && cachedTime) {
					var cacheAge = Date.now() - parseInt(cachedTime);
					if (cacheAge < CACHE_DURATION) {
						try {
							var cache = JSON.parse(cachedData);
							if (cache.braggers && Array.isArray(cache.braggers)) {
								loading.style.display = 'none';
								renderBraggers(cache.braggers);
								return;
							}
						} catch(e) {}
					}
				}
				fetchAllBins();
			}

			loadBraggers();
		});
	</script>
</body>
</html>
