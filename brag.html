<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
	<title>Bragger — Donut Tycoon</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		:root { --text-dim: #9aa0a6; }
		body {
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
			background: #1a1a2e; color: #ffe; min-height: 100vh; min-height: 100dvh;
			display: flex; flex-direction: column; align-items: center; padding: 20px 16px;
			-webkit-font-smoothing: antialiased;
		}
		.back-bar {
			width: 100%; padding: 12px 20px; border-bottom: 1px solid rgba(255,255,255,0.1);
			margin-bottom: 20px; text-align: left; display: flex; justify-content: space-between; align-items: center;
		}
		.back-link { color: #ffeb3b; text-decoration: none; font-size: 0.9rem; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; transition: color 0.15s; }
		.back-link:hover { color: #fff; }
		.community-top-link { color: #a5d6a7; text-decoration: none; font-size: 0.85rem; font-weight: 500; transition: color 0.15s; }
		.community-top-link:hover { color: #fff; }
		h1 { font-size: 1.8rem; margin-bottom: 4px; color: #ffeb3b; }
		.subtitle { font-size: 0.9rem; color: #a5d6a7; margin-bottom: 24px; }
		.input-group { width: 100%; max-width: 380px; margin-bottom: 16px; }
		.input-group label { display: block; font-size: 0.9rem; font-weight: 600; margin-bottom: 4px; color: #ffe; }
		.input-group input { width: 100%; padding: 12px 14px; font-size: 1rem; border: 2px solid #ffd700; border-radius: 10px; background: #16213e; color: #ffe; font-family: inherit; transition: border-color 0.2s; }
		.input-group input:focus { outline: none; border-color: #ff9100; }
		.input-group input::placeholder { color: #888; }
		.input-note { font-size: 0.75rem; color: var(--text-dim); margin-top: 4px; }
		.available-emails-wrapper { width: 100%; max-width: 380px; margin-bottom: 16px; text-align: left; }
		.available-emails-toggle { width: 100%; padding: 10px 14px; font-size: 0.9rem; font-weight: 600; color: #ffe; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; cursor: pointer; text-align: left; transition: background 0.15s; display: flex; justify-content: space-between; align-items: center; }
		.available-emails-toggle:hover { background: rgba(255,255,255,0.1); }
		.available-emails-toggle .arrow { font-size: 0.8rem; transition: transform 0.2s; }
		.available-emails-toggle.open .arrow { transform: rotate(180deg); }
		.available-emails-list { display: none; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-top: none; border-radius: 0 0 8px 8px; max-height: 200px; overflow-y: auto; }
		.available-emails-list.show { display: block; }
		.available-emails-list .email-item { padding: 10px 14px; cursor: pointer; font-size: 0.9rem; color: #d0d3d8; border-bottom: 1px solid rgba(255,255,255,0.06); display: flex; justify-content: space-between; align-items: center; transition: background 0.15s; }
		.available-emails-list .email-item:last-child { border-bottom: none; }
		.available-emails-list .email-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
		.available-emails-list .email-time { font-size: 0.75rem; color: var(--text-dim); }
		.available-emails-empty { padding: 14px; font-size: 0.85rem; color: var(--text-dim); text-align: center; }
		.brag-btn { width: 100%; max-width: 380px; padding: 14px; font-size: 1.2rem; font-weight: bold; color: #fff; background: linear-gradient(135deg, #e91e63, #ff6f00); border: none; border-radius: 12px; cursor: pointer; margin-top: 8px; transition: transform 0.15s, box-shadow 0.15s; letter-spacing: 0.5px; }
		.brag-btn:hover { transform: scale(1.02); box-shadow: 0 6px 20px rgba(233,30,99,0.4); }
		.brag-btn:active { transform: scale(0.97); }
		.error-msg { color: #f28b82; font-size: 0.9rem; margin-top: 12px; text-align: center; display: none; }
		.error-msg.show { display: block; }
		.canvas-wrapper { width: 100%; max-width: 420px; margin-top: 24px; display: none; flex-direction: column; align-items: center; }
		.canvas-wrapper.show { display: flex; }
		canvas { width: 100%; height: auto; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
		.download-btn { width: 100%; max-width: 380px; padding: 14px; font-size: 1.1rem; font-weight: bold; color: #fff; background: linear-gradient(135deg, #4caf50, #2e7d32); border: none; border-radius: 12px; cursor: pointer; margin-top: 16px; transition: transform 0.15s; letter-spacing: 0.3px; }
		.download-btn:hover { transform: scale(1.02); }
		.download-btn:active { transform: scale(0.97); }
		.share-btn { width: 100%; max-width: 380px; padding: 14px; font-size: 1.1rem; font-weight: bold; color: #fff; background: linear-gradient(135deg, #7c4dff, #651fff); border: none; border-radius: 12px; cursor: pointer; margin-top: 10px; transition: transform 0.15s, box-shadow 0.15s; letter-spacing: 0.3px; }
		.share-btn:hover { transform: scale(1.02); box-shadow: 0 6px 20px rgba(124,77,255,0.4); }
		.share-btn:active { transform: scale(0.97); }
		.share-btn:disabled { background: #444; opacity: 0.5; cursor: not-allowed; box-shadow: none; }
		.share-btn.cooldown { background: #555; opacity: 0.7; cursor: not-allowed; box-shadow: none; font-size: 0.9rem; }
		.cooldown-note { font-size: 0.75rem; color: var(--text-dim); text-align: center; margin-top: 6px; display: none; }
		.cooldown-note.show { display: block; }
		.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px); background: #2e7d32; color: #fff; padding: 12px 24px; border-radius: 24px; font-size: 0.95rem; font-weight: 600; z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.25s ease, transform 0.25s ease; box-shadow: 0 6px 24px rgba(0,0,0,0.5); letter-spacing: 0.2px; max-width: 90vw; text-align: center; }
		.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
		.toast.error { background: #c62828; }
		@media (min-width: 500px) { h1 { font-size: 2.2rem; } .brag-btn { font-size: 1.3rem; } }
	</style>
</head>
<body>

	<div class="back-bar">
		<a href="index.html" class="back-link">← Back to Game</a>
		<a href="community.html" class="community-top-link">🌍 Community</a>
	</div>

	<h1>🍩 Bragger</h1>
	<p class="subtitle">Flex your Donut Tycoon empire</p>

	<div class="input-group">
		<label for="playerName">Your Name</label>
		<input type="text" id="playerName" placeholder="e.g. Nyota Wa Kweli" maxlength="40" autocomplete="off">
		<span class="input-note">This will appear on your bragger</span>
	</div>

	<div class="input-group">
		<label for="playerEmail">Your Email</label>
		<input type="email" id="playerEmail" placeholder="your@email.com" autocomplete="off">
		<span class="input-note">Loads your saved game. Use the same email you saved with.</span>
	</div>

	<div class="available-emails-wrapper">
		<button class="available-emails-toggle" id="emailsToggle">Available Emails <span class="arrow">▼</span></button>
		<div class="available-emails-list" id="emailsList"></div>
	</div>

	<button class="brag-btn" id="bragBtn">Brag! 📜</button>
	<p class="error-msg" id="errorMsg"></p>

	<div class="canvas-wrapper" id="canvasWrapper">
		<canvas id="braggerCanvas"></canvas>
		<button class="download-btn" id="downloadBtn">📥 Save My Bragger</button>
		<button class="share-btn" id="shareBtn">🌍 Share to the Community</button>
		<p class="cooldown-note" id="cooldownNote"></p>
	</div>

	<div class="toast" id="toast"></div>

	<script>
		document.addEventListener('DOMContentLoaded', function() {

			var bragBtn = document.getElementById('bragBtn');
			var errorMsg = document.getElementById('errorMsg');
			var canvasWrapper = document.getElementById('canvasWrapper');
			var canvas = document.getElementById('braggerCanvas');
			var ctx = canvas.getContext('2d');
			var downloadBtn = document.getElementById('downloadBtn');
			var shareBtn = document.getElementById('shareBtn');
			var cooldownNote = document.getElementById('cooldownNote');
			var toast = document.getElementById('toast');

			var IMGBB_API_KEY = 'fd2eef8b4df24ab82126c352c5efa9af';
			var ACCESS_KEY = '$2a$10$XcfN.ngGjFuRKOdFxiePK.zff4P238qGtFiDq/eusWHB.TVTKn16q';
			var COOLDOWN_MINUTES = 90;
			var COOLDOWN_MS = COOLDOWN_MINUTES * 60 * 1000;
			var LAST_BRAG_KEY = 'lastBragTime';
			var cooldownTimer = null;

			var BINS = [
				{ id: '6a004b54250b1311c32bfef7', url: 'https://api.jsonbin.io/v3/b/6a004b54250b1311c32bfef7' },
				{ id: '69ffef95250b1311c32a6323', url: 'https://api.jsonbin.io/v3/b/69ffef95250b1311c32a6323' }
				// EMERGENCY BINS — uncomment and add IDs when needed:
				//,{ id: 'BIN_3_ID_HERE', url: 'https://api.jsonbin.io/v3/b/BIN_3_ID_HERE' }
				//,{ id: 'BIN_4_ID_HERE', url: 'https://api.jsonbin.io/v3/b/BIN_4_ID_HERE' }
				//,{ id: 'BIN_5_ID_HERE', url: 'https://api.jsonbin.io/v3/b/BIN_5_ID_HERE' }
			];

			var ACTIVE_BIN_KEY = 'donutActiveBin';
			var MAX_BIN_SIZE = 850000;

			function getActiveBinIndex() {
				var stored = localStorage.getItem(ACTIVE_BIN_KEY);
				if (stored !== null) {
					var idx = parseInt(stored);
					if (idx >= 0 && idx < BINS.length) return idx;
				}
				return 0;
			}

			function setActiveBinIndex(idx) {
				localStorage.setItem(ACTIVE_BIN_KEY, idx);
			}

			var colorPairs = [
				{ name: 'Night & Kiwi', bg: '#222222', accent: '#89E900' },
				{ name: 'Ghost & Persian', bg: '#F7F7FF', accent: '#27187E' },
				{ name: 'Imperial & Night', bg: '#FB3640', accent: '#000F08' },
				{ name: 'Sand & Cyprus', bg: '#F0EDE5', accent: '#004643' },
				{ name: 'Milk & Plum', bg: '#FFF3E6', accent: '#381932' }
			];

			var playerColorKey = 'donutBraggerColor';
			var playerColor = null;
			var currentBraggerData = null;

			function getPlayerColor() {
				var stored = localStorage.getItem(playerColorKey);
				if (stored !== null) {
					var idx = parseInt(stored);
					if (idx >= 0 && idx < colorPairs.length) { playerColor = colorPairs[idx]; return; }
				}
				var randomIdx = Math.floor(Math.random() * colorPairs.length);
				localStorage.setItem(playerColorKey, randomIdx);
				playerColor = colorPairs[randomIdx];
			}
			getPlayerColor();

			function getRank(cps) {
				if (cps >= 10000) return { stars: 5, title: 'Platinum Tycoon', starColor: '#E5E4E2' };
				if (cps >= 1000) return { stars: 4, title: 'Rose Gold Tycoon', starColor: '#E0BFB8' };
				if (cps >= 100) return { stars: 3, title: 'Golden Tycoon', starColor: '#FFD700' };
				if (cps >= 10) return { stars: 2, title: 'Silver Tycoon', starColor: '#C0C0C0' };
				return { stars: 1, title: 'Bronze Tycoon', starColor: '#CD7F32' };
			}

			function getCountryFlag(countryCode) {
				if (!countryCode || countryCode === 'Earth') return '🌍';
				var codePoints = [];
				for (var i = 0; i < 2; i++) { codePoints.push(0x1F1E6 + countryCode.charCodeAt(i) - 65); }
				return String.fromCodePoint(codePoints[0], codePoints[1]);
			}

			function isLightColor(hex) {
				var r = parseInt(hex.slice(1, 3), 16);
				var g = parseInt(hex.slice(3, 5), 16);
				var b = parseInt(hex.slice(5, 7), 16);
				return ((r * 299 + g * 587 + b * 114) / 1000) > 150;
			}

			function showToast(msg, isError) {
				toast.textContent = msg;
				toast.className = "toast" + (isError ? " error" : "");
				setTimeout(function() { toast.classList.add("show"); }, 10);
				clearTimeout(toast._timeout);
				toast._timeout = setTimeout(function() { toast.classList.remove("show"); }, 2500);
			}

			function showError(msg) {
				errorMsg.textContent = msg;
				errorMsg.classList.add('show');
				canvasWrapper.classList.remove('show');
				shareBtn.style.display = 'none';
				cooldownNote.classList.remove('show');
				stopCooldownTimer();
			}

			function hideError() { errorMsg.classList.remove('show'); }

			/*
			 * Cooldown system — limits bragger sharing to once every 3 hours
			 * When a user shares, we save a timestamp. Next time they try,
			 * we check if 3 hours have passed. If not, the button shows
			 * a countdown until they can share again.
			 */
			function isOnCooldown() {
				var lastBrag = localStorage.getItem(LAST_BRAG_KEY);
				if (!lastBrag) return false;
				var elapsed = Date.now() - parseInt(lastBrag);
				return elapsed < COOLDOWN_MS;
			}

			function getCooldownRemaining() {
				var lastBrag = localStorage.getItem(LAST_BRAG_KEY);
				if (!lastBrag) return 0;
				var elapsed = Date.now() - parseInt(lastBrag);
				var remaining = COOLDOWN_MS - elapsed;
				return Math.max(0, remaining);
			}

			function formatCooldown(ms) {
				var minutes = Math.floor(ms / 60000);
				var seconds = Math.floor((ms % 60000) / 1000);
				if (minutes > 0) {
					return minutes + " minute" + (minutes > 1 ? "s" : "") + " " + seconds + "s";
				}
				return seconds + " seconds";
			}

			function applyCooldownUI() {
				if (isOnCooldown()) {
					shareBtn.disabled = true;
					shareBtn.classList.add('cooldown');
					cooldownNote.classList.add('show');
					updateCooldownDisplay();
					startCooldownTimer();
				} else {
					shareBtn.disabled = false;
					shareBtn.classList.remove('cooldown');
					shareBtn.textContent = '🌍 Share to the Community';
					cooldownNote.classList.remove('show');
					stopCooldownTimer();
				}
			}

			function updateCooldownDisplay() {
				if (!isOnCooldown()) {
					applyCooldownUI();
					return;
				}
				var remaining = getCooldownRemaining();
				var formatted = formatCooldown(remaining);
				shareBtn.textContent = '⏳ Wait ' + formatted;
				cooldownNote.textContent = 'You can share again in ' + formatted;
			}

			function startCooldownTimer() {
				stopCooldownTimer();
				cooldownTimer = setInterval(function() {
					if (!isOnCooldown()) {
						applyCooldownUI();
					} else {
						updateCooldownDisplay();
					}
				}, 5000); // Update every 5 seconds
			}

			function stopCooldownTimer() {
				if (cooldownTimer) {
					clearInterval(cooldownTimer);
					cooldownTimer = null;
				}
			}

			function setCooldown() {
				localStorage.setItem(LAST_BRAG_KEY, Date.now().toString());
				applyCooldownUI();
			}

			function drawBragger(name, countryName, countryCode, dateStr, donuts, cps, buildings) {
				var dpr = window.devicePixelRatio || 1;
				var width = 420; var height = 680;
				canvas.width = width * dpr; canvas.height = height * dpr;
				canvas.style.width = width + 'px'; canvas.style.height = height + 'px';
				ctx.scale(dpr, dpr);

				var bg = playerColor.bg; var accent = playerColor.accent;
				var isLight = isLightColor(bg);
				var textColor = isLight ? '#1a1a1a' : '#ffffff';
				var subColor = isLight ? '#444444' : '#cccccc';

				ctx.fillStyle = bg; ctx.beginPath(); var r = 16;
				ctx.moveTo(r,0); ctx.lineTo(width-r,0); ctx.quadraticCurveTo(width,0,width,r);
				ctx.lineTo(width,height-r); ctx.quadraticCurveTo(width,height,width-r,height);
				ctx.lineTo(r,height); ctx.quadraticCurveTo(0,height,0,height-r);
				ctx.lineTo(0,r); ctx.quadraticCurveTo(0,0,r,0); ctx.closePath(); ctx.fill();

				var rank = getRank(cps); var y = 30;
				ctx.fillStyle = accent; ctx.font = 'bold 28px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif'; ctx.textAlign = 'center';
				ctx.fillText('🍩 DONUT', width/2, y+28); y += 34;
				ctx.fillText('TYCOON', width/2, y+28); y += 42;

				var starsStr = ''; for (var s=0; s<rank.stars; s++) starsStr += '★';
				ctx.fillStyle = rank.starColor; ctx.font = '36px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
				ctx.fillText(starsStr, width/2, y+30); y += 36;

				ctx.fillStyle = accent; ctx.font = 'bold 16px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
				ctx.fillText(rank.title, width/2, y+22); y += 36;

				ctx.fillStyle = subColor; ctx.font = '13px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
				ctx.fillText('Awarded to', width/2, y+18); y += 20;

				ctx.fillStyle = textColor; ctx.font = 'bold 22px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
				var displayName = name || 'Anonymous Baker'; if (displayName.length > 24) displayName = displayName.slice(0,22)+'..';
				ctx.fillText(displayName, width/2, y+26); y += 40;

				ctx.fillStyle = textColor; ctx.font = '15px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
				var flag = getCountryFlag(countryCode);
				var locationText = (countryName && countryName !== 'Earth') ? (flag+' '+countryName) : '🌍 Earth';
				ctx.fillText('📍 '+locationText, width/2, y+20); y += 28;
				ctx.fillText('📅 '+dateStr, width/2, y+20); y += 36;

				ctx.strokeStyle = accent; ctx.lineWidth = 2; ctx.beginPath();
				ctx.moveTo(50,y); ctx.lineTo(width-50,y); ctx.stroke(); y += 24;

				ctx.fillStyle = textColor; ctx.font = 'bold 30px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
				ctx.fillText('🍩 '+Math.floor(donuts).toLocaleString(), width/2, y+30); y += 34;

				ctx.fillStyle = subColor; ctx.font = '13px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
				ctx.fillText('Total Donuts Earned', width/2, y+18); y += 32;

				ctx.fillStyle = textColor; ctx.font = 'bold 22px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
				ctx.fillText('⚡ '+cps.toFixed(1)+' /sec', width/2, y+24); y += 28;

				ctx.fillStyle = subColor; ctx.font = '13px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
				ctx.fillText('Donuts Per Second', width/2, y+18); y += 32;

				ctx.strokeStyle = accent; ctx.lineWidth = 2; ctx.beginPath();
				ctx.moveTo(50,y); ctx.lineTo(width-50,y); ctx.stroke(); y += 24;

				ctx.fillStyle = accent; ctx.font = 'bold 15px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
				ctx.fillText('🏗 Buildings Owned', width/2, y+20); y += 30;

				ctx.fillStyle = textColor; ctx.font = '14px "SF Mono", "Fira Code", "Fira Mono", "Roboto Mono", "Courier New", monospace'; ctx.textAlign = 'left';
				var leftX = 60; var rightX = width-60;
				for (var b=0; b<buildings.length; b++) {
					var building = buildings[b];
					ctx.fillText(building.emoji+' '+building.name, leftX, y+18);
					ctx.textAlign = 'right'; ctx.fillText(building.count.toString(), rightX, y+18);
					ctx.textAlign = 'left'; y += 24;
				}
				ctx.textAlign = 'center'; y += 16;

				ctx.strokeStyle = accent; ctx.lineWidth = 2; ctx.beginPath();
				ctx.moveTo(50,y); ctx.lineTo(width-50,y); ctx.stroke(); y += 20;

				ctx.fillStyle = subColor; ctx.font = '11px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
				ctx.fillText('Donut Tycoon © '+new Date().getFullYear(), width/2, y+14);
			}

			function getRelativeTime(timestamp) {
				var now = Date.now(); var diff = now - timestamp;
				var seconds = Math.floor(diff/1000); var minutes = Math.floor(seconds/60);
				var hours = Math.floor(minutes/60); var days = Math.floor(hours/24);
				if (days>30) return Math.floor(days/30)+" month"+(Math.floor(days/30)>1?"s":"")+" ago";
				if (days>0) return days+" day"+(days>1?"s":"")+" ago";
				if (hours>0) return hours+" hour"+(hours>1?"s":"")+" ago";
				if (minutes>0) return minutes+" minute"+(minutes>1?"s":"")+" ago";
				return "just now";
			}

			function getAllSavedEmails() {
				var emails = [];
				for (var i=0; i<localStorage.length; i++) {
					var key = localStorage.key(i);
					if (key && key.indexOf("donutSave_")===0 && key.indexOf("donutSaveTime_")!==0) {
						var email = key.replace("donutSave_","");
						var timeKey = "donutSaveTime_"+email;
						var timestamp = localStorage.getItem(timeKey);
						emails.push({email:email,timestamp:timestamp?parseInt(timestamp):0});
					}
				}
				emails.sort(function(a,b){return b.timestamp-a.timestamp;});
				return emails;
			}

			function refreshEmailsList() {
				var list = document.getElementById('emailsList');
				var emails = getAllSavedEmails();
				if (emails.length===0) { list.innerHTML='<div class="available-emails-empty">No saved games found. Save your game first.</div>'; return; }
				list.innerHTML="";
				for (var i=0; i<emails.length; i++) {
					var item=emails[i]; var div=document.createElement("div"); div.className="email-item";
					div.innerHTML='<span>📧 '+item.email+'</span><span class="email-time">'+(item.timestamp?getRelativeTime(item.timestamp):'unknown')+'</span>';
					div.addEventListener("click",function(){var email=this.querySelector('span').textContent.replace('📧 ','');document.getElementById('playerEmail').value=email;document.getElementById('emailsList').classList.remove("show");document.getElementById('emailsToggle').classList.remove("open");});
					list.appendChild(div);
				}
			}
			refreshEmailsList();

			var emailsToggle=document.getElementById('emailsToggle');
			var emailsList=document.getElementById('emailsList');
			emailsToggle.addEventListener('click',function(){var isOpen=emailsList.classList.contains('show');if(isOpen){emailsList.classList.remove('show');emailsToggle.classList.remove('open');}else{refreshEmailsList();emailsList.classList.add('show');emailsToggle.classList.add('open');}});

			bragBtn.addEventListener('click', function() {
				hideError(); canvasWrapper.classList.remove('show'); shareBtn.style.display='none'; cooldownNote.classList.remove('show'); stopCooldownTimer();
				var name=document.getElementById('playerName').value.trim();
				var email=document.getElementById('playerEmail').value.trim();
				if(!name){showError('Please enter your name.');return;}
				var emailRegex=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;
				if(!email||!emailRegex.test(email)){showError('Please enter a valid email address.');return;}
				var saved=localStorage.getItem('donutSave_'+email);
				if(!saved){showError('No saved game found for this email. Save your game first using the same email.');return;}
				var save; try{save=JSON.parse(saved);}catch(e){showError('Save data is corrupted.');return;}
				if(typeof save.donuts!=='number'||!Array.isArray(save.buildings)){showError('Save data is incomplete.');return;}

				var donuts=save.donuts; var cps=0;
				var buildingData=[{name:'Cursor',emoji:'🖱',count:0,prod:0.1},{name:'Grandma',emoji:'👵',count:0,prod:1},{name:'Donut Stand',emoji:'🍩',count:0,prod:8},{name:'Bakery',emoji:'🥮',count:0,prod:47},{name:'Delivery Van',emoji:'🚚',count:0,prod:260},{name:'Factory',emoji:'🏭',count:0,prod:1400}];
				for(var i=0;i<buildingData.length;i++){if(save.buildings[i]&&typeof save.buildings[i].count==='number')buildingData[i].count=save.buildings[i].count;cps+=buildingData[i].prod*buildingData[i].count;}

				var now=new Date(); var months=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
				var dateStr=now.getDate()+' '+months[now.getMonth()]+' '+now.getFullYear();
				var rank=getRank(cps); var countryName='Earth'; var countryCode='Earth';
				currentBraggerData={name:name,donuts:donuts,cps:cps,buildingData:buildingData,dateStr:dateStr,rank:rank};

				function renderBragger(){drawBragger(name,countryName,countryCode,dateStr,donuts,cps,buildingData);canvasWrapper.classList.add('show');shareBtn.style.display='block';applyCooldownUI();canvasWrapper.scrollIntoView({behavior:'smooth'});}

				if(navigator.geolocation){navigator.geolocation.getCurrentPosition(function(pos){try{var xhr=new XMLHttpRequest();xhr.open('GET','https://nominatim.openstreetmap.org/reverse?format=json&lat='+pos.coords.latitude+'&lon='+pos.coords.longitude+'&zoom=3',true);xhr.timeout=5000;xhr.onload=function(){if(xhr.status===200){try{var data=JSON.parse(xhr.responseText);if(data&&data.address&&data.address.country_code){countryCode=data.address.country_code.toUpperCase();countryName=data.address.country||'Earth';}}catch(e){}}currentBraggerData.countryName=countryName;currentBraggerData.countryCode=countryCode;renderBragger();};xhr.onerror=function(){renderBragger();};xhr.send();}catch(e){renderBragger();}},function(){renderBragger();},{timeout:5000,enableHighAccuracy:false});}else{renderBragger();}
			});

			downloadBtn.addEventListener('click',function(){var dataURL=canvas.toDataURL('image/png');var link=document.createElement('a');link.download='donut-tycoon.png';link.href=dataURL;document.body.appendChild(link);link.click();document.body.removeChild(link);});

			shareBtn.addEventListener('click',function(){
				if(!currentBraggerData)return;

				// Check cooldown
				if (isOnCooldown()) {
					showToast('⏳ You just shared a bragger. Take a break, bake more donuts.', true);
					return;
				}

				shareBtn.disabled=true; shareBtn.textContent='⏳ Uploading...';
				canvas.toBlob(function(blob){
					var formData=new FormData(); formData.append('image',blob,'bragger.png'); formData.append('key',IMGBB_API_KEY);
					var xhr=new XMLHttpRequest(); xhr.open('POST','https://api.imgbb.com/1/upload',true);
					xhr.onload=function(){if(xhr.status===200){try{var resp=JSON.parse(xhr.responseText);if(resp.success&&resp.data&&resp.data.url){postToCommunity(resp.data.url);return;}}catch(e){}}shareBtn.disabled=false;shareBtn.textContent='🌍 Share to the Community';showToast('Upload failed. Try again.',true);};
					xhr.onerror=function(){shareBtn.disabled=false;shareBtn.textContent='🌍 Share to the Community';showToast('Network error. Try again.',true);};
					xhr.send(formData);
				},'image/png');
			});

			function postToCommunity(imageUrl) {
				var d=currentBraggerData;
				var entry={name:d.name,rankTitle:d.rank.title,stars:d.rank.stars,cps:d.cps,donuts:Math.floor(d.donuts),countryName:d.countryName||'Earth',countryCode:d.countryCode||'Earth',date:d.dateStr,imageUrl:imageUrl,timestamp:Date.now()};

				var activeIdx = getActiveBinIndex();
				var activeBin = BINS[activeIdx];

				var checkXhr = new XMLHttpRequest();
				checkXhr.open('GET', activeBin.url, true);
				checkXhr.setRequestHeader('X-Access-Key', ACCESS_KEY);
				checkXhr.timeout = 8000;
				checkXhr.onload = function() {
					if (checkXhr.status === 200) {
						var binSize = checkXhr.responseText.length;
						if (binSize > MAX_BIN_SIZE && activeIdx < BINS.length - 1) {
							activeIdx++;
							setActiveBinIndex(activeIdx);
							activeBin = BINS[activeIdx];
						}
					}
					addToBin(activeBin, entry);
				};
				checkXhr.onerror = function() {
					addToBin(activeBin, entry);
				};
				checkXhr.send();
			}

			function addToBin(bin, entry) {
				var getXhr = new XMLHttpRequest();
				getXhr.open('GET', bin.url, true);
				getXhr.setRequestHeader('X-Access-Key', ACCESS_KEY);
				getXhr.timeout = 8000;
				getXhr.onload = function() {
					var braggers = [];
					if (getXhr.status === 200) {
						try {
							var resp = JSON.parse(getXhr.responseText);
							if (resp.record && Array.isArray(resp.record)) braggers = resp.record;
						} catch(e) {}
					}
					braggers.unshift(entry);

					var putXhr = new XMLHttpRequest();
					putXhr.open('PUT', bin.url, true);
					putXhr.setRequestHeader('Content-Type', 'application/json');
					putXhr.setRequestHeader('X-Access-Key', ACCESS_KEY);
					putXhr.timeout = 8000;
					putXhr.onload = function() {
						if (putXhr.status === 200 || putXhr.status === 201) {
							// Set cooldown after successful share
							setCooldown();
							shareBtn.textContent = '✓ Shared!';
							shareBtn.disabled = true;
							showToast('✓ Shared to the community!');
							setTimeout(function() { window.location.href = 'community.html?fresh=true'; }, 1500);
						} else {
							shareBtn.disabled = false;
							shareBtn.textContent = '🌍 Share to the Community';
							showToast('Failed to save. Try again.', true);
						}
					};
					putXhr.onerror = function() {
						shareBtn.disabled = false;
						shareBtn.textContent = '🌍 Share to the Community';
						showToast('Network error. Try again.', true);
					};
					putXhr.send(JSON.stringify(braggers));
				};
				getXhr.onerror = function() {
					shareBtn.disabled = false;
					shareBtn.textContent = '🌍 Share to the Community';
					showToast('Network error. Try again.', true);
				};
				getXhr.send();
			}
		});
	</script>
</body>
</html>
